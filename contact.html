<!DOCTYPE html>
<html>
	<head>
		<title>
			Contact
		</title>
	</head>
	<body>
		<main>
			<h1>Contact Form</h1>
			<form>
				<label>Name:</label>
				<input type="text" placeholder="Enter your Name">

				<br>

				<label>Email</label>
				<input type="email" placeholder="Enter your Email">

				<br>

				<label>Phone Number:</label>
				<input type="number" placeholder="Enter your Number">

				<br>

				<label>Subject</label>
				<textarea rows="3" cols="5"></textarea>
			</form>
		</main>
	</body>
</html>

<!DOCTYPE html>
<html>
	<head>
		<title>College Admission Form</title>
	</head>
	<body style="background-color: lightgreen;">
		<h1>ABC College of Engineering</h1>

		<br><br>

		<h2>Student Admission Form</h2>

		<br><br>

		<form>
			<label>Name:</label>
			<input type="text" placeholder="Enter you Name">

			<br><br>

			<label>Email:</label>
			<input type="email" placeholde="Enter your Email">

			<br><br>

			<label>Phone Number:</label>
			<input type="number" placeholder="Enter you Number">

			<br><br>

			<label>Date of Birth:</label>
			<input type="date" placeholder="Enter your DOB">

			<br><br>

			<label>Password:</label>
			<input type="password" placeholder="Enter you Password">

			<br><br>

			<label>Confirm Password:</label>
			<input type="password" placeholder="Enter Confirm Password">

			<br><br>

			<label>Gender</label>
				<br>
			<input type="radio" name="gender">
			Male
				<br>
			<input type="radio" name="gender">
			Female
				<br>
			<input type="radio" name="gender">
			Others

			<br><br>

			<label>Department</label>
			<select>
				<option>Artificial Intelligence and Data Science</option>
				<option>Computer Science</option>
				<option>Information Technology</option>
				<option>Mechanical Engineering</option>
				<option>Civil Engineering</option>
			</select>

			<br><br>

			<label>Skills</label>
				<br>
			<input type="checkbox">HTML
				<br>
			<input type="checkbox">CSS
				<br>
			<input type="checkbox">Javascript
				<br>
			<input type="checkbox">Python
				<br>
			<input type="checkbox">C++

			<br><br>

			<label>About Yourself</label>
			
			<br>

			<textarea row="5" cols="50" placeholder="Tell us About Yourself"></textarea>

			<button type="submit">
				Register
			</button>
			
			<br><br>
			<button type="reset">
				Clear
			</button>

			<br><br>

			<label>Thank you for applying for ABC Engineering College</label>
 		</form>
	</body>
</html>
